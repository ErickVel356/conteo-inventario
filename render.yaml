# render.yaml — conteo-inventario
# Cambio: env node → env docker para habilitar wkhtmltopdf.
# plan: standard → mantiene el plan actual (Standard $25/mo, 2 GB RAM).
# IMPORTANTE: NO cambiar plan: a free — downgradearia el servicio.
# Las variables de entorno (SUPABASE_URL, SUPABASE_KEY, BOD_ENABLED, etc.)
# se conservan tal como las tenés configuradas en el Dashboard de Render.
services:
  - type: web
    name: conteo-inventario
    env: docker
    plan: standard
    dockerfilePath: ./Dockerfile
